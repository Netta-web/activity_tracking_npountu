# ─────────────────────────────────────────────────────────────────
# Nginx config for SupportOps Tracker
# Place at: /etc/nginx/sites-available/supportops
# Enable:   sudo ln -s /etc/nginx/sites-available/supportops \
#                      /etc/nginx/sites-enabled/supportops
# Reload:   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────

# Redirect all plain HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let Certbot handle the ACME challenge, redirect everything else
    location /.well-known/acme-challenge/ {
        root /var/www/supportops/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name yourdomain.com www.yourdomain.com;

    # ── Document root points to Laravel /public ──────────────────
    root /var/www/supportops/public;
    index index.php;

    # ── SSL (managed by Certbot — do not edit manually) ──────────
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Charset ──────────────────────────────────────────────────
    charset utf-8;

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # ── Max upload size ──────────────────────────────────────────
    client_max_body_size 20M;

    # ── Laravel routing (pretty URLs, no index.php) ───────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM handler ──────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass   unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Recommended timeouts for a typical ops app
        fastcgi_read_timeout   120;
        fastcgi_connect_timeout 60;
    }

    # ── Static assets: long cache, no logging ────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        log_not_found off;
    }

    # ── Suppress noisy 404s ──────────────────────────────────────
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── Block access to dot-files (.env, .git, etc.) ─────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Block direct access to Laravel internals ─────────────────
    location ~ ^/(vendor|storage|bootstrap/cache) {
        deny all;
    }

    # ── Logs ─────────────────────────────────────────────────────
    access_log /var/log/nginx/supportops_access.log;
    error_log  /var/log/nginx/supportops_error.log warn;
}
